<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group 12 Weather Forecast</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <header>
        <div class="logo">Group 12 Forecast</div>
        <nav>
            <ul>
                <li><a href="#">Trang chủ</a></li>
            </ul>
        </nav>
        <div class="header-info">
            <span id="header-date">01/04/2026</span> | 
            <span id="header-time">12:00</span> | 
            <span id="header-location">Hà Nội, VN</span>
        </div>
    </header>

    <main>
        <section class="today-weather">
            <div class="section-header">
                <h2 id="current-location-title">Hà Nội, Việt Nam</h2>
                <p id="current-date-time">Thứ Tư, 01 Tháng 4, 2026 | 12:40</p>
            </div>

            <div class="weather-box">
                <div class="main-display">
                    <img id="weather-icon" src="icons/cloudy.png" alt="Weather Icon">
                    <div class="temp-group">
                        <span id="current-temp">28°C</span>
                        <p id="weather-desc">Trời nhiều mây</p>
                    </div>
                </div>

                <div class="extra-info">
                    <div class="info-item">
                        <span>Tốc độ gió</span>
                        <strong id="wind-speed">12 km/h</strong>
                    </div>
                    <div class="info-item">
                        <span>Độ ẩm</span>
                        <strong id="humidity">75%</strong>
                    </div>
                </div>
            </div>
        </section>

        <section class="forecast-section">
            <div class="section-header">
                <h2>Forecast 3-day later</h2>
            </div>
            <div class="forecast-container">
                <div class="forecast-row">
                    <span class="f-date">02/04</span>
                    <img src="icons/sun.png" alt="icon">
                    <span class="f-status">Nắng ráo</span>
                    <span class="f-temp">30°C</span>
                </div>
                <div class="forecast-row">
                    <span class="f-date">03/04</span>
                    <img src="icons/rain.png" alt="icon">
                    <span class="f-status">Mưa rào</span>
                    <span class="f-temp">25°C</span>
                </div>
                <div class="forecast-row">
                    <span class="f-date">04/04</span>
                    <span class="f-icon"><img src="icons/cloudy.png" alt="icon"></span>
                    <span class="f-status">Nhiều mây</span>
                    <span class="f-temp">27°C</span>
                </div>
            </div>
        </section>
    </main>

    <script src="weather.js"></script>
</body>
</html>
