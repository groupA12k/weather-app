<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="current-weather">
        <h2 id="location">Hà Nội</h2>
        <p id="date">--/--/----</p>

        <img id="weather-icon" src="icons/sunny.png">
        <h1 id="temperature">--°C</h1>
        <p id="status">---</p>

        <p>Độ ẩm: <span id="humidity">--%</span></p>
        <p>Gió: <span id="wind">-- m/s</span></p>
    </div>

    <div class="forecast">
        <h3>Dự báo</h3>

        <div class="forecast-list">
            <div class="item">
                <p>--/--</p>
                <p>--°C</p>
                <p>---</p>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
